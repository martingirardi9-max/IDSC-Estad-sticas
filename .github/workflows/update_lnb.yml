name: Actualizar datos LNB
on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml
      - run: python scraper_lnb.py
      - run: |
          git config --local user.email "action@github.com"
          git config --local user.name "LNB Auto-updater"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update LNB $(date +'%d/%m/%Y %H:%M')"
          git push
